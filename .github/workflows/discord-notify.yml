name: Discord Notifications

on:
  pull_request:
    branches: [main, develop]
    types: [opened, closed, reopened, review_requested]
  push:
    branches: [main, develop]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: PR Notification
        if: github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          AUTHOR_URL: ${{ github.event.pull_request.user.html_url }}
          AUTHOR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          CHANGED: ${{ github.event.pull_request.changed_files }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
          REPO_URL: ${{ github.event.repository.html_url }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          TIMESTAMP: ${{ github.event.pull_request.updated_at }}
        run: |
          # Escape special characters for JSON
          SAFE_TITLE=$(echo "$PR_TITLE" | jq -Rs '.' | sed 's/^"//;s/"$//')

          if [ "$ACTION" == "closed" ] && [ "$MERGED" == "true" ]; then
            EMOJI="🔀"
            TITLE="Pull Request Merged"
            COLOR=5763719
          elif [ "$ACTION" == "opened" ]; then
            EMOJI="📝"
            TITLE="New Pull Request"
            COLOR=3447003
          elif [ "$ACTION" == "review_requested" ]; then
            EMOJI="👀"
            TITLE="Review Requested"
            COLOR=16776960
          elif [ "$ACTION" == "reopened" ]; then
            EMOJI="🔄"
            TITLE="Pull Request Reopened"
            COLOR=15105570
          else
            EMOJI="❌"
            TITLE="Pull Request Closed"
            COLOR=15158332
          fi

          # Build JSON payload properly
          JSON_PAYLOAD=$(jq -n \
            --arg title "$EMOJI $TITLE" \
            --arg desc "$SAFE_TITLE" \
            --arg url "$PR_URL" \
            --argjson color "$COLOR" \
            --arg repo "$REPO_FULL" \
            --arg repo_url "$REPO_URL" \
            --arg repo_name "$REPO_NAME" \
            --arg author "$AUTHOR" \
            --arg author_url "$AUTHOR_URL" \
            --arg avatar "$AUTHOR_AVATAR" \
            --arg head "$HEAD_BRANCH" \
            --arg base "$BASE_BRANCH" \
            --arg adds "$ADDITIONS" \
            --arg dels "$DELETIONS" \
            --arg files "$CHANGED" \
            --arg pr_num "$PR_NUM" \
            --arg ts "$TIMESTAMP" \
            '{
              username: "GitHub",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                title: $title,
                description: ("**" + $desc + "**"),
                url: $url,
                color: $color,
                author: {
                  name: $repo,
                  url: $repo_url,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                thumbnail: {
                  url: $avatar
                },
                fields: [
                  {name: "📂 Repository", value: ("[`" + $repo_name + "`](" + $repo_url + ")"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $head + "` → `" + $base + "`"), inline: true},
                  {name: "👤 Author", value: ("[@" + $author + "](" + $author_url + ")"), inline: true},
                  {name: "📊 Changes", value: ("`+" + $adds + "` / `-" + $dels + "`"), inline: true},
                  {name: "📁 Files", value: ("`" + $files + " changed`"), inline: true}
                ],
                footer: {
                  text: ($repo + " • PR #" + $pr_num),
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: $ts
              }]
            }')

          curl -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" "$DISCORD_WEBHOOK"

      - name: Push Notification
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          AUTHOR: ${{ github.event.head_commit.author.username }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
          REPO_URL: ${{ github.event.repository.html_url }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          # Get first line and escape for JSON
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | jq -Rs '.' | sed 's/^"//;s/"$//')
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          JSON_PAYLOAD=$(jq -n \
            --arg branch "$BRANCH" \
            --arg desc "$SAFE_MSG" \
            --arg url "$COMMIT_URL" \
            --arg repo "$REPO_FULL" \
            --arg repo_url "$REPO_URL" \
            --arg repo_name "$REPO_NAME" \
            --arg author "$AUTHOR" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg ts "$TIMESTAMP" \
            '{
              username: "GitHub",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                title: ("📦 Push to " + $branch),
                description: ("**" + $desc + "**"),
                url: $url,
                color: 10181046,
                author: {
                  name: $repo,
                  url: $repo_url,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                fields: [
                  {name: "📂 Repository", value: ("[`" + $repo_name + "`](" + $repo_url + ")"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true},
                  {name: "👤 Author", value: ("@" + $author), inline: true},
                  {name: "🔗 Commit", value: ("[`" + $sha + "`](" + $commit_url + ")"), inline: true}
                ],
                footer: {
                  text: $repo,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: $ts
              }]
            }')

          curl -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" "$DISCORD_WEBHOOK"
