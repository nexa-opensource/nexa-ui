name: Discord Notifications

on:
  pull_request:
    branches: [main, develop]
    types: [opened, closed, reopened, review_requested]
  push:
    branches: [main, develop]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: PR Notification
        if: github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Determine event type and styling
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          AUTHOR_URL="${{ github.event.pull_request.user.html_url }}"
          AUTHOR_AVATAR="${{ github.event.pull_request.user.avatar_url }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          ADDITIONS="${{ github.event.pull_request.additions }}"
          DELETIONS="${{ github.event.pull_request.deletions }}"
          CHANGED="${{ github.event.pull_request.changed_files }}"

          if [ "${{ github.event.action }}" == "closed" ] && [ "${{ github.event.pull_request.merged }}" == "true" ]; then
            EMOJI="🔀"
            TITLE="Pull Request Merged"
            COLOR=5763719
          elif [ "${{ github.event.action }}" == "opened" ]; then
            EMOJI="📝"
            TITLE="New Pull Request"
            COLOR=3447003
          elif [ "${{ github.event.action }}" == "review_requested" ]; then
            EMOJI="👀"
            TITLE="Review Requested"
            COLOR=16776960
          elif [ "${{ github.event.action }}" == "reopened" ]; then
            EMOJI="🔄"
            TITLE="Pull Request Reopened"
            COLOR=15105570
          else
            EMOJI="❌"
            TITLE="Pull Request Closed"
            COLOR=15158332
          fi

          curl -H "Content-Type: application/json" -X POST -d "{
            \"username\": \"GitHub\",
            \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
            \"embeds\": [{
              \"title\": \"$EMOJI $TITLE\",
              \"description\": \"**$PR_TITLE**\",
              \"url\": \"$PR_URL\",
              \"color\": $COLOR,
              \"author\": {
                \"name\": \"${{ github.repository }}\",
                \"url\": \"https://github.com/${{ github.repository }}\",
                \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
              },
              \"thumbnail\": {
                \"url\": \"$AUTHOR_AVATAR\"
              },
              \"fields\": [
                {\"name\": \"📂 Repository\", \"value\": \"[\\\`${{ github.event.repository.name }}\\\`](https://github.com/${{ github.repository }})\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"\\\`$HEAD_BRANCH\\\` → \\\`$BASE_BRANCH\\\`\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"[@$AUTHOR]($AUTHOR_URL)\", \"inline\": true},
                {\"name\": \"📊 Changes\", \"value\": \"\\\`+$ADDITIONS\\\` / \\\`-$DELETIONS\\\`\", \"inline\": true},
                {\"name\": \"📁 Files\", \"value\": \"\\\`$CHANGED changed\\\`\", \"inline\": true}
              ],
              \"footer\": {
                \"text\": \"${{ github.repository }} • PR #$PR_NUM\",
                \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
              },
              \"timestamp\": \"${{ github.event.pull_request.updated_at }}\"
            }]
          }" $DISCORD_WEBHOOK

      - name: Push Notification
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          COMMIT_URL="${{ github.event.head_commit.url }}"
          AUTHOR="${{ github.event.head_commit.author.username }}"
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          curl -H "Content-Type: application/json" -X POST -d "{
            \"username\": \"GitHub\",
            \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
            \"embeds\": [{
              \"title\": \"📦 Push to ${{ github.ref_name }}\",
              \"description\": \"**$COMMIT_MSG**\",
              \"url\": \"$COMMIT_URL\",
              \"color\": 10181046,
              \"author\": {
                \"name\": \"${{ github.repository }}\",
                \"url\": \"https://github.com/${{ github.repository }}\",
                \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
              },
              \"fields\": [
                {\"name\": \"📂 Repository\", \"value\": \"[\\\`${{ github.event.repository.name }}\\\`](https://github.com/${{ github.repository }})\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"\\\`${{ github.ref_name }}\\\`\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"@$AUTHOR\", \"inline\": true},
                {\"name\": \"🔗 Commit\", \"value\": \"[\\\`$COMMIT_SHA\\\`]($COMMIT_URL)\", \"inline\": true}
              ],
              \"footer\": {
                \"text\": \"${{ github.repository }}\",
                \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
              },
              \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"
            }]
          }" $DISCORD_WEBHOOK
