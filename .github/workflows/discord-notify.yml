name: Discord Notifications

on:
  pull_request:
    branches: [main, develop]
    types: [opened, closed, reopened, review_requested]
  push:
    branches: [main, develop]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: PR Notification
        if: github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Set variables
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          AUTHOR_URL="${{ github.event.pull_request.user.html_url }}"
          AUTHOR_AVATAR="${{ github.event.pull_request.user.avatar_url }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          ADDITIONS="${{ github.event.pull_request.additions }}"
          DELETIONS="${{ github.event.pull_request.deletions }}"
          CHANGED="${{ github.event.pull_request.changed_files }}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_FULL="${{ github.repository }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          TIMESTAMP="${{ github.event.pull_request.updated_at }}"

          # Determine event type
          if [ "${{ github.event.action }}" == "closed" ] && [ "${{ github.event.pull_request.merged }}" == "true" ]; then
            EMOJI="🔀"
            EVENT_TITLE="Pull Request Merged"
            COLOR=5763719
          elif [ "${{ github.event.action }}" == "opened" ]; then
            EMOJI="📝"
            EVENT_TITLE="New Pull Request"
            COLOR=3447003
          elif [ "${{ github.event.action }}" == "review_requested" ]; then
            EMOJI="👀"
            EVENT_TITLE="Review Requested"
            COLOR=16776960
          elif [ "${{ github.event.action }}" == "reopened" ]; then
            EMOJI="🔄"
            EVENT_TITLE="Pull Request Reopened"
            COLOR=15105570
          else
            EMOJI="❌"
            EVENT_TITLE="Pull Request Closed"
            COLOR=15158332
          fi

          # Build JSON with jq (handles all escaping automatically)
          JSON=$(jq -n \
            --arg emoji "$EMOJI" \
            --arg event_title "$EVENT_TITLE" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            --argjson color "$COLOR" \
            --arg repo_full "$REPO_FULL" \
            --arg repo_url "$REPO_URL" \
            --arg repo_name "$REPO_NAME" \
            --arg author "$AUTHOR" \
            --arg author_url "$AUTHOR_URL" \
            --arg author_avatar "$AUTHOR_AVATAR" \
            --arg head "$HEAD_BRANCH" \
            --arg base "$BASE_BRANCH" \
            --arg adds "$ADDITIONS" \
            --arg dels "$DELETIONS" \
            --arg files "$CHANGED" \
            --arg pr_num "$PR_NUM" \
            --arg ts "$TIMESTAMP" \
            '{
              username: "GitHub",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                title: "\($emoji) \($event_title)",
                description: "**\($pr_title)**",
                url: $pr_url,
                color: $color,
                author: {
                  name: $repo_full,
                  url: $repo_url,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                thumbnail: {
                  url: $author_avatar
                },
                fields: [
                  {name: "📂 Repository", value: "[`\($repo_name)`](\($repo_url))", inline: true},
                  {name: "🌿 Branch", value: "`\($head)` → `\($base)`", inline: true},
                  {name: "👤 Author", value: "[@\($author)](\($author_url))", inline: true},
                  {name: "📊 Changes", value: "`+\($adds)` / `-\($dels)`", inline: true},
                  {name: "📁 Files", value: "`\($files) changed`", inline: true}
                ],
                footer: {
                  text: "\($repo_full) • PR #\($pr_num)",
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: $ts
              }]
            }')

          curl -s -H "Content-Type: application/json" -X POST -d "$JSON" "$DISCORD_WEBHOOK"

      - name: Push Notification
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          AUTHOR="${{ github.event.head_commit.author.username }}"
          BRANCH="${{ github.ref_name }}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_FULL="${{ github.repository }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Get first line of commit message
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)

          JSON=$(jq -n \
            --arg branch "$BRANCH" \
            --arg msg "$FIRST_LINE" \
            --arg commit_url "$COMMIT_URL" \
            --arg repo_full "$REPO_FULL" \
            --arg repo_url "$REPO_URL" \
            --arg repo_name "$REPO_NAME" \
            --arg author "$AUTHOR" \
            --arg sha "$SHORT_SHA" \
            --arg ts "$TIMESTAMP" \
            '{
              username: "GitHub",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                title: "📦 Push to \($branch)",
                description: "**\($msg)**",
                url: $commit_url,
                color: 10181046,
                author: {
                  name: $repo_full,
                  url: $repo_url,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                fields: [
                  {name: "📂 Repository", value: "[`\($repo_name)`](\($repo_url))", inline: true},
                  {name: "🌿 Branch", value: "`\($branch)`", inline: true},
                  {name: "👤 Author", value: "@\($author)", inline: true},
                  {name: "🔗 Commit", value: "[`\($sha)`](\($commit_url))", inline: true}
                ],
                footer: {
                  text: $repo_full,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: $ts
              }]
            }')

          curl -s -H "Content-Type: application/json" -X POST -d "$JSON" "$DISCORD_WEBHOOK"
